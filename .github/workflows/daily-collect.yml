# Tech News Daily Collection - GitHub Actions scheduled task
# Target: report in IMA by 01:07 Beijing Time (UTC 17:07) every day
# GitHub public repo cron delay ~7.5h, so set cron at UTC 09:00 → fires ~UTC 16:30 (Beijing 00:30)
# Two cron slots (09:00 + 10:00) with 3h dedup window

name: Daily Tech News Collection

on:
  schedule:
    # Target: IMA report by 01:07 Beijing (UTC 17:07)
    # GitHub public repo schedule delay is typically ~7.5 hours
    # Reverse-calculated: UTC 09:00 + 7.5h delay ≈ UTC 16:30 → Beijing 00:30 ✅
    - cron: '0 9 * * *'   # UTC 09:00, est. fire UTC 16:00-17:00 (Beijing 00:00-01:00)
    - cron: '0 10 * * *'  # UTC 10:00, est. fire UTC 17:00-18:00 (Beijing 01:00-02:00, backup)

  workflow_dispatch:
    inputs:
      dry_run:
        description: 'dry run (no IMA write)'
        type: boolean
        default: false

concurrency:
  group: daily-collect
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check if already ran recently
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Manual trigger always runs
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "Manual trigger, proceeding"
            exit 0
          fi

          # For scheduled runs, check if there's a successful run within last 3 hours
          THREE_HOURS_AGO=$(date -u -d '3 hours ago' '+%Y-%m-%dT%H:%M:%SZ')
          echo "Checking for successful runs since $THREE_HOURS_AGO"

          RECENT=$(curl -s -H "Authorization: Bearer $GH_TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/actions/runs?per_page=5&status=completed&conclusion=success" \
            | jq -r ".workflow_runs[] | select(.created_at >= \"$THREE_HOURS_AGO\") | .created_at" | head -1)

          if [ -n "$RECENT" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "Already ran successfully at $RECENT, skipping"
          else
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "No recent run, proceeding with collection"
          fi

      - name: Checkout
        if: steps.check.outputs.skip != 'true'
        uses: actions/checkout@v4

      - name: Setup Python
        if: steps.check.outputs.skip != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        if: steps.check.outputs.skip != 'true'
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -c "import jieba; jieba.initialize()"

      - name: Show current time
        if: steps.check.outputs.skip != 'true'
        run: |
          echo "UTC: $(date -u)"
          echo "Beijing: $(TZ='Asia/Shanghai' date)"

      - name: Run pipeline
        if: steps.check.outputs.skip != 'true'
        env:
          IMA_CLIENT_ID: ${{ secrets.IMA_CLIENT_ID }}
          IMA_API_KEY: ${{ secrets.IMA_API_KEY }}
          IMA_KB_ID: ${{ secrets.IMA_KB_ID }}
          WECHAT_WEBHOOK: ${{ secrets.WECHAT_WEBHOOK }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_API_BASE: ${{ secrets.OPENAI_API_BASE }}
        run: |
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            python main.py --dry-run
          else
            python main.py
          fi

      - name: Upload report
        if: always() && steps.check.outputs.skip != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: daily-report-${{ github.run_id }}
          path: output/*.md
          retention-days: 30

      - name: Done
        if: always()
        run: |
          if [ "${{ steps.check.outputs.skip }}" = "true" ]; then
            echo "Skipped - already ran today"
          elif [ "${{ job.status }}" = "success" ]; then
            echo "Pipeline completed successfully!"
          else
            echo "Pipeline failed, check logs"
          fi
