# ---- IMA 知识库配置 ----
ima:
  base_url: "https://ima.qq.com"
  client_id: ""                   # 本地运行可填入，GitHub Actions 从 Secrets 读取
  api_key: ""                     # 本地运行可填入，GitHub Actions 从 Secrets 读取
  knowledge_base_id: ""             # 可选，知识库 ID
  # 分类笔记ID（在IMA中创建好分类笔记后填入）
  category_notes:
    C01: ""  # AI与大模型
    C02: ""  # 芯片与半导体
    C03: ""  # 智能汽车与新能源
    C04: ""  # 互联网平台与产品
    C05: ""  # 创投与融资
    C06: ""  # 硬件与消费电子
    C07: ""  # 科技政策与监管
    C08: ""  # 开源与技术工具

# ---- 运行参数 ----
pipeline:
  # 每日采集过去多少小时的新闻
  lookback_hours: 24
  # 去重相似度阈值（0-1），越高越严格
  dedup_threshold: 0.8
  # 日报 Top N 条做深度摘要
  top_n_summary: 10
  # 输出目录
  output_dir: "./output"
  # 分类体系
  categories:
    C01: "AI与大模型"
    C02: "芯片与半导体"
    C03: "智能汽车与新能源"
    C04: "互联网平台与产品"
    C05: "创投与融资"
    C06: "硬件与消费电子"
    C07: "科技政策与监管"
    C08: "开源与技术工具"

# ---- 通知渠道（可选）----
notification:
  enabled: false
  wechat_work_webhook: ""  # 企业微信机器人 Webhook 地址
